<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <!-- 📱 모바일 반응형의 핵심: 이 한 줄이 스마트폰에서 화면 깨짐을 막아줍니다 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="description" content="개인과 사업의 돈 흐름을 한 곳에서 관리하는 가벼운 자산관리 ERP" />
  <meta name="theme-color" content="#3182F6" />

  <!-- 앱 아이콘 (브라우저 탭/즐겨찾기) -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>한손 · 개인과 사업을 한 흐름으로</title>

  <!-- 웹 폰트: Pretendard (깔끔한 산세리프 / 인터넷 연결 시 적용) -->
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />

  <!-- 스타일시트 연결 (index.html과 같은 폴더에 style.css가 있어야 합니다) -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ===== 상단 헤더 ===== -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">한</span>
      <div class="brand-text">
        <strong>한손</strong>
        <span>개인과 사업을 한 흐름으로</span>
      </div>
    </div>
    <div class="month-picker">
      <button id="prevMonth" aria-label="이전 달">‹</button>
      <!-- 이 글자를 누르면 연/월 선택창이 뜹니다 -->
      <button id="currentMonth" class="month-label" aria-label="연·월 선택">2026.06</button>
      <button id="nextMonth" aria-label="다음 달">›</button>
    </div>
  </header>

  <!-- ===== 본문 ===== -->
  <main class="container">

    <!-- ─── 1) 대시보드 ─── -->
    <section id="view-dashboard" class="view active">

      <!-- 사업 / 개인 전환 토글 -->
      <div class="dash-toggle seg" id="dashToggle">
        <button class="seg-btn active" data-dscope="business">💼 사업</button>
        <button class="seg-btn" data-dscope="personal">🏠 개인</button>
      </div>

      <div class="section-head">
        <h2 id="dashTitle">사업 대시보드</h2>
        <p class="muted"><span id="dashMonthLabel">6월</span> 기준 분석</p>
      </div>

      <!-- 핵심 지표 (JS가 4개 카드를 채웁니다) -->
      <div class="kpi-grid kpi-4" id="kpiGrid"></div>

      <!-- 추세 -->
      <div class="panel">
        <h3 id="trendTitle">최근 6개월 추세</h3>
        <div id="trendChart" class="trend-chart"></div>
        <div class="legend">
          <span><i class="dot income"></i><span id="legendIncome">매출</span></span>
          <span><i class="dot expense"></i><span id="legendExpense">비용</span></span>
        </div>
      </div>

      <!-- 카테고리 분석 -->
      <div class="panel">
        <h3 id="catTitle">비용 카테고리 <small class="muted">(많이 쓴 순)</small></h3>
        <div id="categoryBreakdown" class="cat-list"></div>
      </div>

      <!-- 일별 달력 -->
      <div class="panel">
        <h3 id="calTitle">일별 달력</h3>
        <div class="cal-weekdays">
          <span class="sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="sat">토</span>
        </div>
        <div id="calendarGrid" class="cal-grid"></div>
        <div id="dayDetail" class="day-detail"></div>
      </div>
    </section>

    <!-- ─── 2) 입력 ─── -->
    <section id="view-add" class="view">
      <div class="section-head">
        <h2>거래 입력</h2>
        <p class="muted">개인/사업을 구분해 간편하게 기록하세요.</p>
      </div>

      <form id="txForm" class="tx-form" novalidate>
        <div class="field">
          <label>구분</label>
          <div class="seg" role="radiogroup">
            <button type="button" class="seg-btn active" data-scope="business">💼 사업</button>
            <button type="button" class="seg-btn" data-scope="personal">🏠 개인</button>
          </div>
        </div>

        <div class="field">
          <label>유형</label>
          <div class="seg" role="radiogroup">
            <button type="button" class="seg-btn type-btn active" data-type="expense">지출 / 비용</button>
            <button type="button" class="seg-btn type-btn" data-type="income">수입 / 매출</button>
          </div>
        </div>

        <div class="field">
          <label for="txAmount">금액 (원)</label>
          <input type="text" id="txAmount" inputmode="numeric" placeholder="0" autocomplete="off" />
        </div>

        <div class="field">
          <label for="txCategory">카테고리</label>
          <select id="txCategory"></select>
        </div>

        <div class="field">
          <label for="txDate">날짜</label>
          <input type="date" id="txDate" />
        </div>

        <div class="field">
          <label for="txMemo">메모 <small class="muted">(선택)</small></label>
          <input type="text" id="txMemo" placeholder="예: 6월 클라이언트 A 용역비" autocomplete="off" />
        </div>

        <button type="submit" class="btn-primary">기록 저장</button>
        <p id="formMsg" class="form-msg" aria-live="polite"></p>
      </form>
    </section>

    <!-- ─── 3) 내역 ─── -->
    <section id="view-list" class="view">
      <div class="section-head">
        <h2>거래 내역</h2>
        <p class="muted">이번 달에 기록한 모든 거래입니다.</p>
      </div>

      <div class="filter-bar">
        <button class="chip active" data-filter="all">전체</button>
        <button class="chip" data-filter="business">사업</button>
        <button class="chip" data-filter="personal">개인</button>
        <button id="exportBtn" class="chip export">⤓ CSV 내보내기</button>
      </div>

      <div id="txList" class="tx-list"></div>
    </section>
  </main>

  <!-- ===== 연/월 선택 바텀시트 ===== -->
  <div id="pickerOverlay" class="picker-overlay" hidden>
    <div class="picker-sheet">
      <div class="picker-grab"></div>
      <div class="picker-year">
        <button id="pickerPrevYear" aria-label="이전 해">‹</button>
        <strong id="pickerYearLabel">2026</strong>
        <button id="pickerNextYear" aria-label="다음 해">›</button>
      </div>
      <div class="picker-months" id="pickerMonths"></div>
    </div>
  </div>

  <!-- ===== 하단 탭 내비게이션 (모바일 친화) ===== -->
  <nav class="tabbar">
    <button class="tab active" data-view="dashboard"><span>📊</span>대시보드</button>
    <button class="tab" data-view="add"><span>➕</span>입력</button>
    <button class="tab" data-view="list"><span>📑</span>내역</button>
  </nav>

  <!-- 스크립트 연결 (index.html과 같은 폴더에 app.js가 있어야 합니다) -->
  <script src="app.js" defer></script>
</body>
</html>
