<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="description" content="개인과 사업의 돈 흐름을 한 곳에서 관리하는 가벼운 자산관리 ERP" />
  <meta name="theme-color" content="#3182F6" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>한손 · 개인과 사업을 한 흐름으로</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ===== 스플래시 화면 ===== -->
  <div id="splashScreen">
    <div class="splash-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100" height="100">
        <rect x="2" y="2" width="60" height="60" rx="16" fill="#3182F6"/>
        <text x="32" y="34" text-anchor="middle" dominant-baseline="central"
              font-family="Pretendard,-apple-system,'Apple SD Gothic Neo',sans-serif" font-weight="800"
              font-size="36" fill="#ffffff">한</text>
      </svg>
    </div>
    <p class="splash-title">한손</p>
    <p class="splash-sub">내 사업과 살림을 한손에</p>
  </div>

  <!-- ===== 로그인 화면 ===== -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <span class="login-mark">한</span>
      <h1 class="login-title">한손</h1>
      <p class="login-sub">개인과 사업을 한 흐름으로</p>
      <button id="googleLoginBtn" class="google-btn">
        <svg class="g-logo" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Google 계정으로 로그인
      </button>
      <p class="login-foot">구글 계정으로 안전하게 시작하세요.</p>
    </div>
  </div>

  <!-- ===== 상단 헤더 (왼쪽 로고 · 가운데 날짜 · 오른쪽 메뉴) ===== -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">한</span>
      <strong class="brand-name">한손</strong>
    </div>
    <div class="month-picker">
      <button id="prevMonth" aria-label="이전 달">‹</button>
      <button id="currentMonth" class="month-label" aria-label="연·월 선택">2026.06</button>
      <button id="nextMonth" aria-label="다음 달">›</button>
    </div>
    <button id="menuBtn" class="menu-btn" aria-label="메뉴">☰</button>
  </header>

  <main class="container">

    <!-- ─── 대시보드 ─── -->
    <section id="view-dashboard" class="view active">
      <div class="dash-toggle seg" id="dashToggle">
        <button class="seg-btn active" data-dscope="business">💼 사업</button>
        <button class="seg-btn" data-dscope="personal">🏠 개인</button>
      </div>
      <div class="section-head">
        <h2 id="dashTitle">사업 대시보드</h2>
        <p class="muted"><span id="dashMonthLabel">6월</span> 기준 분석</p>
      </div>
      <div class="kpi-grid kpi-4" id="kpiGrid"></div>
      <div class="panel">
        <div class="cal-weekdays">
          <span class="sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="sat">토</span>
        </div>
        <div id="calendarGrid" class="cal-grid"></div>
        <div id="dayDetail" class="day-detail"></div>
      </div>
      <div class="panel">
        <h3 id="catTitle">비용 카테고리 <small class="muted">(많이 쓴 순)</small></h3>
        <div id="categoryBreakdown" class="cat-list"></div>
      </div>
      <div id="vatPanel" class="panel" hidden></div>
      <div class="panel">
        <h3 id="trendTitle">최근 6개월 추세</h3>
        <div id="trendChart" class="trend-chart"></div>
        <div class="legend">
          <span><i class="dot income"></i><span id="legendIncome">매출</span></span>
          <span><i class="dot expense"></i><span id="legendExpense">비용</span></span>
        </div>
      </div>
    </section>

    <!-- ─── 입력 ─── -->
    <!-- ─── 입력 팝업(모달) ─── -->
    <div id="inputOverlay" class="modal-overlay" hidden>
      <div class="modal-sheet">
        <div class="modal-grab"></div>
        <div class="modal-head">
          <strong id="inputModalTitle"></strong>
          <button type="button" id="inputClose" class="modal-close" aria-label="닫기">✕</button>
        </div>
        <div class="modal-body">
          <!-- 입력 모드 토글 -->
          <div class="seg input-mode-seg" id="inputModeSeg">
            <button type="button" class="seg-btn active" data-imode="tx">📝 거래 입력</button>
            <button type="button" class="seg-btn" data-imode="sched">📅 일정 추가</button>
          </div>

          <form id="txForm" class="tx-form" novalidate>
            <div class="field">
              <label>구분</label>
              <div class="seg" role="radiogroup">
                <button type="button" class="seg-btn active" data-scope="business">💼 사업</button>
                <button type="button" class="seg-btn" data-scope="personal">🏠 개인</button>
              </div>
            </div>
            <div class="field">
              <label>유형</label>
              <div class="seg" role="radiogroup">
                <button type="button" class="seg-btn type-btn active" data-type="expense">지출 / 비용</button>
                <button type="button" class="seg-btn type-btn" data-type="income">수입 / 매출</button>
              </div>
            </div>
            <div class="field">
              <label for="txAmount">금액 (원)</label>
              <input type="text" id="txAmount" inputmode="numeric" placeholder="0" autocomplete="off" />
            </div>
            <div class="field">
              <label for="txCategory">카테고리</label>
              <select id="txCategory"></select>
              <button type="button" id="catEditToggle" class="cat-edit-toggle">＋ 카테고리 추가·삭제</button>
              <div id="catEditor" class="cat-editor" hidden>
                <div id="catPills" class="cat-pills"></div>
                <div class="cat-add">
                  <input type="text" id="catAddInput" placeholder="새 카테고리 이름" autocomplete="off" />
                  <button type="button" id="catAddBtn" class="cat-add-btn">＋ 추가</button>
                </div>
              </div>
            </div>
            <div class="field">
              <label for="txDate">날짜</label>
              <input type="date" id="txDate" />
            </div>
            <div class="field">
              <label>반복 <small class="muted">(정기 구독·임대료 등 자동 등록)</small></label>
              <div class="seg" role="radiogroup">
                <button type="button" class="seg-btn rep-btn active" data-repeat="once">한 번</button>
                <button type="button" class="seg-btn rep-btn" data-repeat="monthly">🔁 매월</button>
                <button type="button" class="seg-btn rep-btn" data-repeat="yearly">🔁 매년</button>
              </div>
            </div>
            <!-- 사진 첨부 (임시 비활성화)
            <div class="field">
              <label>사진 첨부 <small class="muted">(영수증 등, 선택)</small></label>
              <label for="txPhoto" class="photo-add-btn">📷 사진 추가</label>
              <input type="file" id="txPhoto" accept="image/*" multiple hidden />
              <div id="photoPreview" class="photo-preview"></div>
            </div>
            -->
            <div class="field">
              <label for="txMemo">메모 <small class="muted">(선택)</small></label>
              <input type="text" id="txMemo" placeholder="예: 6월 클라이언트 A 용역비" autocomplete="off" />
            </div>
            <button type="submit" class="btn-primary">저장</button>
            <p id="formMsg" class="form-msg" aria-live="polite"></p>
          </form>

          <!-- 일정 추가 섹션 -->
          <div id="inlineSchedSection">
            <form id="inlineSchedForm" class="tx-form" novalidate>
              <div class="field">
                <label>구분</label>
                <div class="seg" role="radiogroup" id="inSchedScopeSeg">
                  <button type="button" class="seg-btn active" data-scope="business">💼 사업</button>
                  <button type="button" class="seg-btn" data-scope="personal">🏠 개인</button>
                </div>
              </div>
              <div class="field">
                <label for="inSchedTitle">일정 제목</label>
                <input type="text" id="inSchedTitle" placeholder="예: 세금 납부, 거래처 미팅" autocomplete="off" />
              </div>
              <div class="field">
                <label for="inSchedDate">날짜</label>
                <input type="date" id="inSchedDate" />
              </div>
              <div class="field">
                <label>시간 <small class="muted">(선택)</small></label>
                <div class="time-range">
                  <input type="time" id="inSchedStartTime" />
                  <span class="time-sep">~</span>
                  <input type="time" id="inSchedEndTime" />
                </div>
              </div>
              <div class="field">
                <label for="inSchedMemo">메모 <small class="muted">(선택)</small></label>
                <input type="text" id="inSchedMemo" placeholder="추가 메모" autocomplete="off" />
              </div>
              <div class="field">
                <label>색상</label>
                <div class="sched-colors" id="inSchedColors">
                  <button type="button" class="sched-color-btn active" data-color="blue"   style="background:#3182F6"></button>
                  <button type="button" class="sched-color-btn"        data-color="green"  style="background:#20C997"></button>
                  <button type="button" class="sched-color-btn"        data-color="orange" style="background:#FF9500"></button>
                  <button type="button" class="sched-color-btn"        data-color="red"    style="background:#F04452"></button>
                  <button type="button" class="sched-color-btn"        data-color="purple" style="background:#7C5CFC"></button>
                </div>
              </div>
              <button type="submit" class="btn-primary">저장</button>
              <button type="button" id="inSchedDelete" class="btn-delete" hidden>일정 삭제</button>
              <p id="inSchedMsg" class="form-msg" aria-live="polite"></p>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- ─── 내역 ─── -->
    <section id="view-list" class="view">
      <div class="section-head">
        <h2>거래 내역</h2>
        <p class="muted">이번 달에 기록한 모든 거래입니다.</p>
      </div>
      <div class="filter-bar">
        <button class="chip active" data-filter="all">전체</button>
        <button class="chip" data-filter="business">사업</button>
        <button class="chip" data-filter="personal">개인</button>
        <button id="exportBtn" class="chip export">⤓ CSV 내보내기</button>
      </div>
      <div id="txList" class="tx-list"></div>
    </section>

    <!-- ─── 부가세 계산기 (메뉴에서 진입) ─── -->
    <section id="view-vat" class="view">
      <div class="section-head">
        <h2>부가세 계산기</h2>
        <p class="muted"><span id="vatViewMonthLabel">6월</span> 기준 · 사업 거래 추정</p>
      </div>
      <div id="vatViewContent"></div>
    </section>

    <!-- ─── 자산 관리 (메뉴에서 진입) ─── -->
    <section id="view-assets" class="view">
      <div class="section-head">
        <h2>자산 관리</h2>
        <p class="muted">내가 가진 자산과 부채를 한눈에.</p>
      </div>
      <div class="kpi-grid" id="assetKpi"></div>
      <div class="panel">
        <h3>카테고리별 자산</h3>
        <div id="assetBreakdown" class="cat-list"></div>
      </div>
      <div class="panel">
        <h3 id="assetFormTitle">자산 추가</h3>
        <div class="asset-form">
          <div class="seg" id="assetKindSeg">
            <button type="button" class="seg-btn active" data-kind="asset">자산</button>
            <button type="button" class="seg-btn" data-kind="liability">부채</button>
          </div>
          <input type="text" id="assetName" placeholder="이름 (예: 주거래 통장)" autocomplete="off" />
          <select id="assetCategory"></select>
          <button type="button" id="assetCatEditToggle" class="cat-edit-toggle">＋ 카테고리 추가·삭제</button>
          <div id="assetCatEditor" class="cat-editor" hidden>
            <div id="assetCatPills" class="cat-pills"></div>
            <div class="cat-add">
              <input type="text" id="assetCatAddInput" placeholder="새 카테고리 이름" autocomplete="off" />
              <button type="button" id="assetCatAddBtn" class="cat-add-btn">＋ 추가</button>
            </div>
          </div>
          <input type="text" id="assetBalance" inputmode="numeric" placeholder="금액 (원)" autocomplete="off" />
          <button type="button" id="assetAddBtn" class="btn-primary">자산 추가</button>
          <button type="button" id="assetCancelBtn" class="btn-secondary" hidden>취소</button>
        </div>
      </div>
      <div class="panel">
        <h3>자산 목록</h3>
        <div id="assetList" class="tx-list"></div>
      </div>
    </section>

    <!-- ─── 정기 거래 관리 (메뉴에서 진입) ─── -->
    <section id="view-recurring" class="view">
      <div class="section-head">
        <h2>정기 거래 관리</h2>
        <p class="muted">매월·매년 자동 등록되는 거래 목록입니다.</p>
      </div>
      <div class="panel">
        <div id="recurringList" class="tx-list"></div>
      </div>
    </section>
  </main>

  <!-- ===== 연/월 선택 바텀시트 ===== -->
  <div id="pickerOverlay" class="picker-overlay" hidden>
    <div class="picker-sheet">
      <div class="picker-grab"></div>
      <div class="picker-year">
        <button id="pickerPrevYear" aria-label="이전 해">‹</button>
        <strong id="pickerYearLabel">2026</strong>
        <button id="pickerNextYear" aria-label="다음 해">›</button>
      </div>
      <div class="picker-months" id="pickerMonths"></div>
    </div>
  </div>

  <!-- ===== 메뉴 드로어 ===== -->
  <div id="menuOverlay" class="menu-overlay" hidden>
    <div class="menu-drawer">
      <div class="menu-title">전체 메뉴</div>
      <div id="menuUser" class="menu-user"></div>
      <button class="menu-item" data-view="dashboard"><span>📊</span> 대시보드</button>
      <button class="menu-item" data-view="add"><span>➕</span> 거래 입력</button>
      <button class="menu-item" data-view="list"><span>📑</span> 거래 내역</button>
      <button class="menu-item" data-view="sched"><span>📅</span> 일정 등록</button>
      <div class="menu-divider"></div>
      <button class="menu-item" data-view="vat"><span>🧾</span> 부가세 계산기</button>
      <button class="menu-item" data-view="assets"><span>💰</span> 자산 관리</button>
      <button class="menu-item" data-view="recurring"><span>🔁</span> 정기 거래 관리</button>
      <div class="menu-divider"></div>
      <button class="menu-item" id="logoutBtn"><span>🚪</span> 로그아웃</button>
    </div>
  </div>

  <!-- ===== 일정 등록/수정 모달 ===== -->
  <div id="schedOverlay" class="modal-overlay" hidden>
    <div class="modal-sheet">
      <div class="modal-grab"></div>
      <div class="modal-head">
        <strong id="schedModalTitle">일정 등록</strong>
        <button type="button" id="schedClose" class="modal-close" aria-label="닫기">✕</button>
      </div>
      <div class="modal-body">
        <form id="schedForm" class="tx-form" novalidate>
          <div class="field">
            <label>구분</label>
            <div class="seg" role="radiogroup" id="schedScopeSeg">
              <button type="button" class="seg-btn active" data-scope="business">💼 사업</button>
              <button type="button" class="seg-btn" data-scope="personal">🏠 개인</button>
            </div>
          </div>
          <div class="field">
            <label for="schedTitle">일정 제목</label>
            <input type="text" id="schedTitle" placeholder="예: 세금 납부, 거래처 미팅" autocomplete="off" />
          </div>
          <div class="field">
            <label for="schedDate">날짜</label>
            <input type="date" id="schedDate" />
          </div>
          <div class="field">
            <label>시간 <small class="muted">(선택)</small></label>
            <div class="time-range">
              <input type="time" id="schedStartTime" />
              <span class="time-sep">~</span>
              <input type="time" id="schedEndTime" />
            </div>
          </div>
          <div class="field">
            <label for="schedMemo">메모 <small class="muted">(선택)</small></label>
            <input type="text" id="schedMemo" placeholder="추가 메모" autocomplete="off" />
          </div>
          <div class="field">
            <label>색상</label>
            <div class="sched-colors">
              <button type="button" class="sched-color-btn active" data-color="blue" style="background:#3182F6"></button>
              <button type="button" class="sched-color-btn" data-color="green" style="background:#20C997"></button>
              <button type="button" class="sched-color-btn" data-color="orange" style="background:#FF9500"></button>
              <button type="button" class="sched-color-btn" data-color="red" style="background:#F04452"></button>
              <button type="button" class="sched-color-btn" data-color="purple" style="background:#7C5CFC"></button>
            </div>
          </div>
          <button type="submit" class="btn-primary">저장</button>
          <button type="button" id="schedDelete" class="btn-delete" hidden>일정 삭제</button>
          <p id="schedMsg" class="form-msg" aria-live="polite"></p>
        </form>
      </div>
    </div>
  </div>

  <!-- ===== 사진 보기 오버레이 ===== -->
  <div id="photoOverlay" class="photo-overlay" hidden>
    <button type="button" id="photoClose" class="photo-close" aria-label="닫기">✕</button>
    <div id="photoViewer" class="photo-viewer"></div>
  </div>

  <!-- ===== 우하단 거래 입력 버튼 ===== -->
  <button id="fab" class="fab" aria-label="거래 입력">＋</button>

  <!-- Firebase (로그인용) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script src="app.js" defer></script>
</body>
</html>
